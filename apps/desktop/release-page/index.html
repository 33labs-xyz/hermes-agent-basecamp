<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Download Basecamp</title>
  <meta name="robots" content="noindex" />
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --fg: #e8eaed;
      --muted: #9aa0aa;
      --accent: #4f8cff;
      --border: #262a33;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: var(--accent);
      color: #fff;
      font-size: 40px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    h1 { margin: 0 0 4px; font-size: 26px; }
    .ver { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
    .btns { display: flex; flex-direction: column; gap: 12px; }
    a.btn {
      display: block;
      padding: 14px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      border: 1px solid var(--border);
      color: var(--fg);
      background: #1d212a;
      transition: border-color .15s, background .15s;
    }
    a.btn:hover { border-color: var(--accent); background: #222735; }
    a.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    a.btn[hidden] { display: none; }
    .sub { color: var(--muted); font-size: 13px; margin-top: 22px; line-height: 1.5; }
    .sub a { color: var(--accent); }
    .err { color: #ff6b6b; font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">B</div>
    <h1>Download Basecamp</h1>
    <div class="ver" id="version">Loading latest version…</div>
    <div class="btns" id="btns">
      <a class="btn primary" id="dl-mac-arm" href="#" hidden>Download for Mac (Apple Silicon)</a>
      <a class="btn" id="dl-mac-intel" href="#" hidden>Download for Mac (Intel)</a>
      <a class="btn primary" id="dl-win" href="#" hidden>Download for Windows</a>
    </div>
    <div class="err" id="err" hidden></div>
    <p class="sub">
      Trouble installing? On Mac, right-click the app and choose <b>Open</b> the first time.<br />
      All builds: <a id="all" href="https://github.com/33labs-xyz/hermes-agent-basecamp/releases/latest" target="_blank" rel="noopener">view every download on GitHub</a>.
    </p>
  </main>

  <script>
    // Pull the latest release from the public repo and wire each OS button to
    // its actual asset. Keeps this page static while always linking the newest
    // version (asset filenames embed the version, so they cannot be hardcoded).
    const REPO = '33labs-xyz/hermes-agent-basecamp'
    const API = 'https://api.github.com/repos/' + REPO + '/releases/latest'

    function pick(assets, test) {
      const a = assets.find(test)
      return a ? a.browser_download_url : null
    }

    function showBtn(id, url) {
      const el = document.getElementById(id)
      if (!url) return
      el.href = url
      el.hidden = false
    }

    fetch(API, { headers: { Accept: 'application/vnd.github+json' } })
      .then(r => { if (!r.ok) throw new Error('GitHub API ' + r.status); return r.json() })
      .then(rel => {
        document.getElementById('version').textContent = 'Latest: ' + (rel.tag_name || rel.name || '')
        const assets = rel.assets || []
        const name = a => a.name.toLowerCase()
        showBtn('dl-mac-arm', pick(assets, a => name(a).endsWith('.dmg') && name(a).includes('arm64')))
        showBtn('dl-mac-intel', pick(assets, a => name(a).endsWith('.dmg') && (name(a).includes('x64') || name(a).includes('intel'))))
        // Fallback: single universal/unspecified dmg
        if (document.getElementById('dl-mac-arm').hidden && document.getElementById('dl-mac-intel').hidden) {
          showBtn('dl-mac-arm', pick(assets, a => name(a).endsWith('.dmg')))
          document.getElementById('dl-mac-arm').textContent = 'Download for Mac'
        }
        showBtn('dl-win', pick(assets, a => name(a).endsWith('.exe')))
        if (!assets.length) {
          const e = document.getElementById('err')
          e.textContent = 'No downloads published yet.'
          e.hidden = false
        }
      })
      .catch(err => {
        document.getElementById('version').textContent = ''
        const e = document.getElementById('err')
        e.textContent = 'Could not load downloads. Use the GitHub link below.'
        e.hidden = false
        console.error(err)
      })
  </script>
</body>
</html>
