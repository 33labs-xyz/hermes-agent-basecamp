name: Build Windows Installer (unsigned)

# Unsigned Basecamp Windows installer for tester distribution.
# Produces an NSIS .exe that drives scripts/install.ps1 on the user's machine.
# No code signing — testers will see a SmartScreen "unknown publisher" prompt
# and must click "More info" -> "Run anyway". Signing is a separate, later step.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Basecamp-Setup.exe (unsigned)
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache Rust targets
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: apps/bootstrap-installer/src-tauri

      - name: Build installer
        run: npm run tauri:build
        working-directory: apps/bootstrap-installer

      - name: Upload NSIS installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: Basecamp-Setup-installer
          path: apps/bootstrap-installer/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload raw exe
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: Basecamp-Setup-exe
          path: apps/bootstrap-installer/src-tauri/target/release/Hermes-Setup.exe
